name: Build and Release (Portable + Setup)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  # 1. Tự động tạo Tag khi push vào main
  tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.tagging.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Determine Bump Type
        id: bump_type
        shell: bash
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -eq 9 ]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
      - name: Bump version and push tag
        id: tagging
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ steps.bump_type.outputs.type }}

  # 2. Build và Release
  build:
    runs-on: windows-latest
    if: always() && !cancelled() && !failure()
    needs: tag
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/GifOverlay.Wpf.csproj

    - name: Build and Publish
      run: dotnet publish src/GifOverlay.Wpf.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o dist/GIF-Overlay

    - name: Create Portable Zip
      shell: powershell
      run: |
        if (Test-Path "dist/*.zip") { Remove-Item "dist/*.zip" }
        Compress-Archive -Path "dist/GIF-Overlay/*" -DestinationPath "dist/GIF-Overlay-Portable.zip"

    - name: Compile Setup (Inno Setup)
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
      with:
        path: setup_script.iss

    - name: Determine Release Tag
      id: release_tag
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ needs.tag.outputs.new_tag }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      if: steps.release_tag.outputs.tag != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_tag.outputs.tag }}
        files: |
          dist/GIF-Overlay-Portable.zip
          dist/GIF-Overlay-Setup.exe
        name: Release ${{ steps.release_tag.outputs.tag }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
