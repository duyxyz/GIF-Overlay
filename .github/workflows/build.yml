name: Build and Release (Portable + Setup)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  # 1. Tự động tạo Tag khi push vào main
  tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Determine Bump Type
        id: bump_type
        shell: bash
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -eq 9 ]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ steps.bump_type.outputs.type }}

  # 2. Build và Release
  build:
    runs-on: windows-latest
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs: tag
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller (Directory Mode)
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon "assets/app_icon.ico" --add-data "assets;assets" --add-data "demo1.gif;." --name "GIF-Overlay" "GIF Overlay.py"

    - name: Create Portable Zip
      shell: powershell
      run: |
        # 1. Clean old zips
        if (Test-Path "dist/*.zip") { Remove-Item "dist/*.zip" }
        
        # 2. Zip the folder as the Portable version
        Compress-Archive -Path "dist/GIF-Overlay" -DestinationPath "dist/GIF-Overlay-Portable.zip"

    - name: Compile Setup (Inno Setup)
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
      with:
        path: setup_script.iss

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        # Upload BOTH the Portable Zip and the Setup Executable
        files: |
          dist/GIF-Overlay-Portable.zip
          dist/GIF-Overlay-Setup.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
