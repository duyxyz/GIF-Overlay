name: CI - Build Check & Auto Tag
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Kiểm tra Build trên mọi lần push/PR để phát hiện lỗi sớm
  build-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/GifOverlay.Wpf.csproj
      - name: Build
        run: dotnet build src/GifOverlay.Wpf.csproj -c Release

  # Chỉ tạo Tag khi push thành công vào main
  create-tag:
    needs: build-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.tagging.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Determine Bump Type
        id: bump_type
        shell: bash
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -eq 9 ]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
      - name: Bump version and push tag
        id: tagging
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ steps.bump_type.outputs.type }}
