name: Publish to Winget
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.9)'
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: duyxyz.GIF-Overlay
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
